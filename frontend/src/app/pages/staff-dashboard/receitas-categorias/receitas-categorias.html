<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Relatório de Receitas por Categoria</h2>

    <button class="btn btn-danger" (click)="gerarPdf()">
      Gerar PDF
    </button>
  </div>

  <div *ngIf="erro" class="alert alert-danger">
    {{ erro }}
  </div>

  <div *ngIf="carregando" class="alert alert-info">
    Carregando relatório...
  </div>

  <table class="table table-striped" *ngIf="!carregando">
    <thead>
      <tr>
        <th>Categoria</th>
        <th>Quantidade</th>
        <th>Valor total</th>
        <th>Percentual</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let categoria of categorias">
        <td>{{ categoria.nome }}</td>
        <td>{{ categoria.quantidade }}</td>
        <td>{{ categoria.valorTotal | currency:'BRL':'symbol':'1.2-2' }}</td>
        <td>{{ categoria.percentual }}%</td>
      </tr>

      <tr *ngIf="categorias.length === 0">
        <td colspan="4" class="text-center">
          Nenhuma receita encontrada.
        </td>
      </tr>
    </tbody>
  </table>
</div>
