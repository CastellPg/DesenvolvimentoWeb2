<div class="login-container">
  <div class="login-card">
    <form (ngSubmit)="fazerLogin()" class="login-form" novalidate>
      <div class="icon-box">
        <i class="bi bi-tools"></i>
      </div>

      <h1>Bem-Vindo</h1>
      <h2>Login</h2>

      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Digite seu e-mail"
          [(ngModel)]="loginUsuario.email"
          required
        />
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <div class="password-container">
          <input
            [type]="hidePassword() ? 'password' : 'text'"
            [(ngModel)]="loginUsuario.senha"
            id="password"
            name="password"
            placeholder="Digite sua senha"
            minlength="4"
            required
          />

          <button type="button" (click)="togglePassword()">
            <i [class]="hidePassword() ? 'fi-rs-crossed-eye' : 'fi fi-rs-eye'"></i>
          </button>
        </div>
      </div>

      <div *ngIf="mensagemErro()" class="mensagem-erro">
        {{ mensagemErro() }}
      </div>

      <button type="submit" class="btn-entrar">
        ENTRAR
      </button>

      <div class="form-footer">
        <p>
          Ainda não tem conta?
          <a routerLink="/registro" class="link-registro">Registre-se aqui</a>
        </p>
      </div>
    </form>
  </div>
</div>
