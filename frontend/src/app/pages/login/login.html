<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="assets/logo.png" alt="TcMaint Logo" class="logo" />
      <h1>TECMAINT</h1>
      <p>SOLUTIONS</p>
    </div>

    <form class="login-form">
      <h2>LOGIN TO TÉCNICO E CLIENTE</h2>

      <div class="input-group">
        <label for="email">Usuário / Email</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required />
      </div>

      <div class="input-group">
        <label for="passowrd">Senha</label>
        <div class="passowrd-container">
          <!-- -> vai servir p arrumar o olho dps -->
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Digite sua senha"
            required
          />
          <span class="toggle-password">Vai ter um olho aqui</span>
        </div>
      </div>

      <button type="submit" class="btn-entrar">ENTRAR</button>

      <div class="form-footer">
        <a href="#" class="link-esqueceu">Esqueceu a senha?</a>
        <!-- -> Arrumar aqui quando estiver tudo pronto -->
        <p>
          Ainda não tem conta? <a routerLink="/registrar" class="link-registro">Registre-se aqui</a>
          <!-- -> Ter certeza dessa rota -->
        </p>
      </div>
    </form>
  </div>
</div>
