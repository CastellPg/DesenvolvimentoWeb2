<div class="container-fluid p-4">

  <div class="mb-4">
    <h2 class="fw-bold mb-1">Minhas Solicitações</h2>
    <p class="text-muted">Acompanhe o histórico completo de todos os seus equipamentos</p>
  </div>

  <div class="d-flex flex-column gap-3">

    <div class="card border-0 shadow-sm rounded-4" *ngFor="let req of todasSolicitacoes">
      <div class="card-body p-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">

        <div class="flex-grow-1 row align-items-center">

          <div class="col-12 col-md-5 mb-3 mb-md-0">
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="badge {{ getBadgeClass(req.estado) }} px-2 py-1">{{ req.estado }}</span>
              <small class="text-muted"><i class="bi bi-calendar3"></i> {{ req.dataHora | date:'dd/MM/yyyy, HH:mm' }}</small>
            </div>
            <h6 class="fw-bold mb-1">{{ req.equipamento }}</h6>

            <div *ngIf="req.valor">
              <small class="text-success fw-bold">{{ req.valor | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</small>
            </div>
          </div>

          <div class="col-12 col-md-4 text-md-center">
            <small class="text-muted d-block" style="font-size: 0.75rem;">Categoria</small>
            <span class="fw-medium">{{ req.categoria }}</span>
          </div>
        </div>

        <div class="d-flex flex-column align-items-md-end justify-content-center min-vw-25">
          <button [routerLink]="['/client/visualizar', req.id]" class="btn btn-outline-dark rounded-pill px-4 py-2 fw-medium btn-sm d-flex align-items-center gap-2">
            <i class="bi bi-eye"></i> Ver Detalhes
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
